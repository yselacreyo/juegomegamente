<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megamind Tic-Tac-Toe</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Arial', sans-serif;
            background: #000;
        }

        /* CAPA DE FONDO */
        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* REEMPLAZA 'agubardofrente.png' con tu ruta de imagen */
            background: #1a1a2e url('agubardofrente.png') no-repeat center top;
            background-size: cover;
            z-index: 1;
        }

        /* CAPA DEL JUEGO (Invisible pero permite clics en sus hijos) */
        #game-ui {
            display: none; /* Se muestra al entrar */
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* IMPORTANTE: Permite hacer clic a través de las zonas vacías */
        }

        /* EL TABLERO (Se vuelve interactivo con pointer-events: auto) */
        #game-board {
            position: absolute;
            /* POSICIÓN EN LA FRENTE: Ajusta este % según tu imagen */
            top: 18%; 
            left: 50%;
            transform: translate(-50%, -50%);
            
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(8px); /* Efecto cristal sobre la cara */
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            pointer-events: auto; /* Habilita clics para el juego */
        }

        .cell {
            width: 80px; height: 80px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        .cell:hover { background: rgba(255, 255, 255, 0.1); }

        /* CHAT */
        #chat-container {
            position: absolute;
            bottom: 20px; left: 20px;
            width: 280px; height: 350px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px; 
            display: flex; flex-direction: column;
            color: white; border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto; /* El chat sí debe recibir clics */
            backdrop-filter: blur(5px);
        }

        #chat-messages {
            flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem;
        }
        .msg { margin-bottom: 8px; line-height: 1.2; }
        .msg b { color: #2ecc71; } /* Color para el nombre */

        #chat-input-area { display: flex; padding: 8px; background: rgba(0,0,0,0.3); }
        #chat-input { 
            flex: 1; border-radius: 20px; border: none; 
            padding: 5px 12px; outline: none; font-size: 0.8rem;
        }
        #chat-btn { 
            background: #2ecc71; border: none; color: white; 
            margin-left: 5px; padding: 5px 12px; 
            border-radius: 15px; cursor: pointer; 
        }

        /* ESTADÍSTICAS */
        #stats-bar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 50px;
            color: white; text-shadow: 2px 2px 5px black; font-size: 1.5rem;
            z-index: 20;
        }

        .player-info { 
            display: flex; align-items: center; gap: 10px; 
            background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 30px;
        }
        .avatar-img { 
            width: 35px; height: 35px; border-radius: 50%; 
            background: #444; display: flex; align-items: center; 
            justify-content: center; font-size: 1.2rem; border: 2px solid white;
        }

        /* INDICADOR DE TURNO */
        #turn-text {
            position: absolute; top: 100px; width: 100%; text-align: center;
            color: #f1c40f; font-size: 1.8rem; font-weight: bold;
            text-shadow: 2px 2px 8px black;
            pointer-events: none;
        }

        /* OVERLAY GANADOR */
        #winner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 100; color: white; font-size: 3rem; flex-direction: column;
        }

        /* PANTALLA DE ENTRADA */
        #join-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 1000; color: white;
            padding: 20px;
            box-sizing: border-box;
        }
        #join-screen h1 {
            font-size: 1.8rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.4;
        }
        #join-screen input {
            padding: 12px; width: 280px; max-width: 90vw; border-radius: 25px; 
            border: none; margin-bottom: 20px; text-align: center; font-size: 1rem;
            box-sizing: border-box;
        }
        #join-screen button, #join-screen #room-buttons button {
            padding: 12px 40px; border-radius: 25px; border: none;
            background: #2ecc71; color: white; font-size: 1.2rem; cursor: pointer;
        }
        #join-screen #room-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        #join-screen #room-buttons button:last-child { background: #3498db; }
        #join-screen #join-room-area { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        #join-screen #join-room-area input { width: 120px; text-align: center; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 4px; }
        #join-screen #join-room-area button { padding: 10px 20px; font-size: 1rem; }
        #join-screen #join-room-area button:last-child { background: #666; }
        #room-code-display {
            font-size: 3rem; font-weight: bold; letter-spacing: 8px;
            background: rgba(255,255,255,0.1); padding: 10px 30px;
            border-radius: 10px; margin: 10px 0; font-family: monospace;
        }
        #room-code-below-board {
            position: absolute;
            top: calc(18% + 330px);
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: auto;
            display: none;
        }
        #room-code-below-board .code-label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 2px;
        }
        #room-code-below-board .code-value {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 6px;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 4px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #room-info {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 999; color: white;
            padding: 20px; box-sizing: border-box;
        }

        /* RESPONSIVE - TABLET */
        @media (max-width: 768px) {
            #game-board { grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); top: 15%; }
            .cell { width: 60px; height: 60px; font-size: 2rem; }
            #chat-container { width: 200px; height: 220px; }
            #stats-bar { font-size: 1.2rem; gap: 20px; top: 12px; }
            #turn-text { top: 80px; font-size: 1.3rem; }
            #room-code-below-board { top: calc(15% + 260px); }
            #room-code-below-board .code-value { font-size: 1.6rem; letter-spacing: 5px; }
        }

        /* RESPONSIVE - CELULAR */
        @media (max-width: 480px) {
            #join-screen h1 { font-size: 0.95rem; padding: 0 15px; }
            #join-screen input { font-size: 0.85rem; padding: 8px; width: 90%; max-width: 260px; }
            #join-screen #room-buttons { flex-direction: column; width: 90%; max-width: 260px; }
            #join-screen #room-buttons button { font-size: 0.95rem; padding: 10px; width: 100%; }
            #join-screen #join-room-area { flex-direction: column; width: 90%; max-width: 260px; }
            #join-screen #join-room-area input { width: 100%; font-size: 1.1rem; letter-spacing: 3px; }
            #join-screen #join-room-area button { width: 100%; padding: 8px; font-size: 0.9rem; }

            #room-info p { font-size: 0.85rem; text-align: center; }
            #room-code-display { font-size: 2rem; letter-spacing: 6px; padding: 8px 20px; }
            #room-info button { font-size: 0.9rem; padding: 8px 20px; }

            #game-board {
                grid-template-columns: repeat(3, 44px);
                grid-template-rows: repeat(3, 44px);
                top: 13%;
                gap: 4px;
                padding: 7px;
                border-radius: 8px;
            }
            .cell { width: 44px; height: 44px; font-size: 1.3rem; }
            #room-code-below-board { top: calc(13% + 210px); }
            #room-code-below-board .code-value { font-size: 1.3rem; letter-spacing: 4px; padding: 3px 12px; }
            #room-code-below-board .code-label { font-size: 0.7rem; }

            #stats-bar {
                top: auto;
                bottom: 12px;
                left: 8px;
                width: auto;
                flex-direction: column;
                gap: 4px;
                font-size: 0.65rem;
                z-index: 30;
            }
            .player-info { padding: 2px 8px; gap: 4px; border-radius: 16px; }
            .avatar-img { width: 20px; height: 20px; font-size: 0.6rem; min-width: 20px; }

            #turn-text {
                top: 30%;
                bottom: auto;
                font-size: 0.85rem;
                pointer-events: none;
            }

            #chat-container {
                top: auto;
                bottom: 12px;
                right: 8px;
                left: auto;
                width: 120px;
                height: 100px;
                border-radius: 8px;
            }
            #chat-messages { padding: 3px 5px; font-size: 0.6rem; max-height: 60px; }
            #chat-input-area { padding: 2px; }
            #chat-input { padding: 2px 5px; font-size: 0.55rem; border-radius: 8px; }
            #chat-btn { padding: 2px 5px; margin-left: 2px; font-size: 0.55rem; }
        }

        @media (max-width: 360px) {
            #join-screen h1 { font-size: 0.8rem; }
            #room-code-display { font-size: 1.6rem; letter-spacing: 4px; }

            #game-board {
                grid-template-columns: repeat(3, 36px);
                grid-template-rows: repeat(3, 36px);
                top: 12%;
                gap: 3px;
                padding: 5px;
            }
            .cell { width: 36px; height: 36px; font-size: 1rem; }
            #stats-bar { font-size: 0.55rem; }
            #turn-text { top: 28%; font-size: 0.7rem; }
            #chat-container { width: 100px; height: 85px; }
            #chat-messages { font-size: 0.5rem; }
            #room-code-below-board { top: calc(12% + 180px); }
            #room-code-below-board .code-value { font-size: 1rem; letter-spacing: 3px; padding: 2px 10px; }
            #room-code-below-board .code-label { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="join-screen">
        <h1>Echa chismecito mientras juegas trica traca<br>con tu amigo en la frente de Megamente</h1>
        <input type="text" id="username-input" placeholder="Tu nombre...">
        <div id="room-buttons">
            <button onclick="crearSala()">🎮 Crear Sala</button>
            <button onclick="mostrarUnirse()">🔗 Unirse a Sala</button>
        </div>
        <div id="join-room-area" style="display:none;">
            <input type="text" id="room-code-input" placeholder="Código de sala (ej: AB12)" maxlength="4" style="text-transform:uppercase;">
            <button onclick="unirseSala()">Entrar</button>
            <button onclick="cancelarUnirse()" style="background:#666;">Cancelar</button>
        </div>
        <div id="room-info">
            <p style="margin-bottom:5px;">Compartí este código con tu amigo:</p>
            <div id="room-code-display"></div>
            <button onclick="copiarEnlace()">📋 Copiar enlace</button>
            <p id="waiting-text" style="font-size:0.8rem;margin-top:10px;color:#f1c40f;">Esperando que alguien se una...</p>
        </div>
    </div>

    <div id="game-ui">
        <div id="stats-bar">
            <div id="p1-info" class="player-info"></div>
            <div id="p2-info" class="player-info"></div>
        </div>

        <div id="turn-text" class="turn-indicator">Esperando oponente...</div>

        <div id="game-board">
            <div class="cell" onclick="makeMove(0)" data-index="0"></div>
            <div class="cell" onclick="makeMove(1)" data-index="1"></div>
            <div class="cell" onclick="makeMove(2)" data-index="2"></div>
            <div class="cell" onclick="makeMove(3)" data-index="3"></div>
            <div class="cell" onclick="makeMove(4)" data-index="4"></div>
            <div class="cell" onclick="makeMove(5)" data-index="5"></div>
            <div class="cell" onclick="makeMove(6)" data-index="6"></div>
            <div class="cell" onclick="makeMove(7)" data-index="7"></div>
            <div class="cell" onclick="makeMove(8)" data-index="8"></div>
        </div>

        <div id="room-code-below-board">
            <div class="code-label">Código de sala:</div>
            <div class="code-value" id="room-code-value"></div>
        </div>

        <div id="winner-overlay" class="winner-overlay">
            <div id="winner-text"></div>
            <button onclick="playAgain()">Jugar de nuevo</button>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe..." onkeydown="if(event.key==='Enter') sendChat()">
                <button id="chat-btn" onclick="sendChat()">></button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let mySymbol = '';
        let myName = '';
        let myAvatar = '';
        let myColor = '';

        const avatars = ['👤', '🤖', '👽', '🦸', '🕵️', '🦁'];

        function getNombre() {
            const name = document.getElementById('username-input').value.trim();
            if (!name) { alert("Pon tu nombre"); return null; }
            return name;
        }

        function crearSala() {
            const name = getNombre();
            if (!name) return;
            myName = name;
            const randomAvatar = avatars[Math.floor(Math.random() * avatars.length)];
            myAvatar = randomAvatar;
            socket.emit('create-room', { name, avatar: randomAvatar });
            document.getElementById('room-buttons').style.display = 'none';
            document.getElementById('username-input').disabled = true;
        }

        function mostrarUnirse() {
            document.getElementById('room-buttons').style.display = 'none';
            document.getElementById('join-room-area').style.display = 'flex';
        }

        function cancelarUnirse() {
            document.getElementById('join-room-area').style.display = 'none';
            document.getElementById('room-buttons').style.display = 'flex';
        }

        function unirseSala() {
            const name = getNombre();
            if (!name) return;
            const roomId = document.getElementById('room-code-input').value.trim().toUpperCase();
            if (!roomId || roomId.length < 2) { alert("Pon un código de sala válido"); return; }
            myName = name;
            const randomAvatar = avatars[Math.floor(Math.random() * avatars.length)];
            myAvatar = randomAvatar;
            socket.emit('join-room', { name, avatar: randomAvatar, roomId });
        }

        function copiarEnlace() {
            const roomId = document.getElementById('room-code-display').innerText;
            const url = window.location.origin + '?room=' + roomId;
            navigator.clipboard.writeText(url).then(() => {
                alert('Enlace copiado: ' + url);
            });
        }

        function makeMove(index) {
            socket.emit('make-move', index);
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            socket.emit('chat-message', text);
            input.value = '';
        }

        function playAgain() {
            document.getElementById('winner-overlay').style.display = 'none';
            socket.emit('reset-game');
        }

        // Auto-unirse si hay ?room= en la URL
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const roomParam = params.get('room');
            if (roomParam) {
                document.getElementById('room-code-input').value = roomParam.toUpperCase();
                setTimeout(() => unirseSala(), 500);
            }
        });

        socket.on('room-created', (data) => {
            document.getElementById('join-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('room-info').style.display = 'flex';
            document.getElementById('room-code-display').innerText = data.roomId;
            document.getElementById('room-code-value').innerText = data.roomId;
            document.getElementById('room-code-below-board').style.display = 'block';
        });

        socket.on('room-error', (data) => {
            alert(data.message);
        });

        socket.on('game-start', () => {
            document.getElementById('room-info').style.display = 'none';
            document.getElementById('room-code-below-board').style.display = 'none';
            document.getElementById('turn-text').innerText = '¡Juego Iniciado! Turno de X';
            document.getElementById('winner-overlay').style.display = 'none';
        });

        socket.on('assign-symbol', (data) => {
            mySymbol = data.symbol;
            myColor = data.color;
            myAvatar = data.avatar;
            document.getElementById('join-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        });

        socket.on('update-players', (players) => {
            const p1 = players.find(p => p.symbol === 'X');
            const p2 = players.find(p => p.symbol === 'O');
            if (p1) updateInfo('p1-info', p1);
            if (p2) updateInfo('p2-info', p2);
        });

        function updateInfo(elementId, player) {
            const div = document.getElementById(elementId);
            div.innerHTML = `
                <span class="avatar-img" style="background:white;">${player.avatar}</span>
                <span style="color: ${player.color}">${player.name} (${player.score})</span>
                <span>${player.symbol}</span>
            `;
        }

        socket.on('update-scores', (players) => {
            const p1 = players.find(p => p.symbol === 'X');
            const p2 = players.find(p => p.symbol === 'O');
            if (p1) updateInfo('p1-info', p1);
            if (p2) updateInfo('p2-info', p2);
        });

        socket.on('update-turn', (data) => {
            document.getElementById('turn-text').innerText = data.turn ? `Turno de ${data.turn}` : (data.message || '');
        });

        socket.on('update-board-visual', (board) => {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => {
                cells[i].innerText = val || '';
                if (val === 'X') cells[i].style.color = '#3498db';
                else if (val === 'O') cells[i].style.color = '#e74c3c';
                else cells[i].style.color = 'white';
            });
        });

        socket.on('game-over', (data) => {
            if (data.winner === 'draw') {
                document.getElementById('winner-text').innerText = '¡Empate!';
            } else {
                document.getElementById('winner-text').innerText = `¡Ganador: ${data.winner}!`;
            }
            document.getElementById('winner-overlay').style.display = 'flex';
            document.getElementById('turn-text').innerText = '¡Juego Terminado!';
        });

        socket.on('reset-board', () => {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerText = ''; c.style.color = 'white'; });
            document.getElementById('winner-overlay').style.display = 'none';
        });

        socket.on('chat-message', (data) => {
            const container = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.innerHTML = `<span style="color:${data.color}">${data.avatar} ${data.name}:</span> ${data.text}`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        });

        socket.on('player-disconnected', (data) => {
            document.getElementById('turn-text').innerText = data.message;
            const roomCode = document.getElementById('room-code-display').innerText;
            if (roomCode) {
                document.getElementById('room-info').style.display = 'block';
            }
        });
    </script>
</body>
</html>
