<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megamind Tic-Tac-Toe</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Arial', sans-serif;
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e url('agubardofrente.png') no-repeat center top;
            background-size: cover;
            z-index: -1;
        }

        #join-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white;
        }

        #game-ui {
            display: none;
            position: relative;
            width: 100%; height: 100%;
        }

        #game-board {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 2px solid white;
        }

        .cell {
            width: 80px; height: 80px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; color: white;
            cursor: pointer;
        }

        #chat-container {
            position: absolute;
            bottom: 20px; left: 20px;
            width: 280px; height: 350px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px; display: flex; flex-direction: column;
            color: white; border: 1px solid rgba(255,255,255,0.3);
        }

        #chat-messages {
            flex: 1; overflow-y: auto; padding: 10px; font-size: 0.8rem;
        }

        #chat-input-area { display: flex; padding: 5px; }
        #chat-input { flex: 1; border-radius: 5px; border: none; padding: 5px; }
        #chat-btn { background: #2ecc71; border: none; color: white; padding: 5px 10px; cursor: pointer; }

        #stats-bar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 50px;
            color: white; text-shadow: 2px 2px 4px black; font-size: 1.5rem;
        }

        .player-info { display: flex; align-items: center; gap: 10px; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; background: gray; display: flex; align-items: center; justify-content: center; }

        .turn-indicator {
            position: absolute; top: 100px; width: 100%; text-align: center;
            color: yellow; font-size: 1.5rem; font-weight: bold;
            text-shadow: 2px 2px 4px black;
        }

        .winner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 200; color: white; font-size: 3rem; flex-direction: column;
        }
        .winner-overlay button {
            margin-top: 20px; padding: 10px 30px; font-size: 1.2rem; cursor: pointer;
        }

        @media (max-width: 768px) {
            #game-board {
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
                top: 10%;
            }
            .cell { width: 60px; height: 60px; font-size: 2rem; }
            #chat-container { width: 220px; height: 260px; }
            #stats-bar { font-size: 1.2rem; gap: 30px; }
        }

        @media (max-width: 480px) {
            #game-board {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
                top: 8%;
                gap: 4px;
                padding: 8px;
            }
            .cell { width: 50px; height: 50px; font-size: 1.6rem; }
            #chat-container { width: 140px; height: 180px; bottom: 10px; left: 10px; font-size: 0.7rem; }
            #chat-messages { padding: 5px; }
            #chat-input { padding: 3px; font-size: 0.7rem; }
            #chat-btn { padding: 3px 6px; }
            #stats-bar { font-size: 0.9rem; gap: 15px; top: 10px; }
            .avatar-img { width: 28px; height: 28px; font-size: 0.8rem; }
            .turn-indicator { top: 70px; font-size: 1rem; }
            .winner-overlay { font-size: 2rem; }
            .winner-overlay button { font-size: 1rem; padding: 8px 20px; }
        }

        @media (max-width: 360px) {
            #game-board {
                grid-template-columns: repeat(3, 40px);
                grid-template-rows: repeat(3, 40px);
                top: 7%;
                gap: 3px;
                padding: 6px;
            }
            .cell { width: 40px; height: 40px; font-size: 1.3rem; }
            #chat-container { width: 120px; height: 150px; }
            #stats-bar { font-size: 0.7rem; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="join-screen">
        <h1>MEGAMIND TIC-TAC-TOE</h1>
        <input type="text" id="username-input" placeholder="Tu nombre..." style="padding: 10px; font-size: 1.2rem;">
        <button onclick="joinGame()" style="margin-top: 20px; padding: 10px 30px; font-size: 1.2rem; cursor: pointer;">Entrar a la Sala</button>
    </div>

    <div id="game-ui">
        <div id="stats-bar">
            <div id="p1-info" class="player-info"></div>
            <div id="p2-info" class="player-info"></div>
        </div>

        <div id="turn-text" class="turn-indicator">Esperando oponente...</div>

        <div id="game-board">
            <div class="cell" onclick="makeMove(0)" data-index="0"></div>
            <div class="cell" onclick="makeMove(1)" data-index="1"></div>
            <div class="cell" onclick="makeMove(2)" data-index="2"></div>
            <div class="cell" onclick="makeMove(3)" data-index="3"></div>
            <div class="cell" onclick="makeMove(4)" data-index="4"></div>
            <div class="cell" onclick="makeMove(5)" data-index="5"></div>
            <div class="cell" onclick="makeMove(6)" data-index="6"></div>
            <div class="cell" onclick="makeMove(7)" data-index="7"></div>
            <div class="cell" onclick="makeMove(8)" data-index="8"></div>
        </div>

        <div id="winner-overlay" class="winner-overlay">
            <div id="winner-text"></div>
            <button onclick="playAgain()">Jugar de nuevo</button>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe..." onkeydown="if(event.key==='Enter') sendChat()">
                <button id="chat-btn" onclick="sendChat()">></button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let mySymbol = '';
        let myName = '';
        let myAvatar = '';
        let myColor = '';

        const avatars = ['👤', '🤖', '👽', '🦸', '🕵️', '🦁'];

        function joinGame() {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return alert("Pon tu nombre");
            myName = name;
            const randomAvatar = avatars[Math.floor(Math.random() * avatars.length)];
            myAvatar = randomAvatar;
            socket.emit('join-game', { name, avatar: randomAvatar });
            document.getElementById('join-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        }

        function makeMove(index) {
            socket.emit('make-move', index);
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            socket.emit('chat-message', text);
            input.value = '';
        }

        function playAgain() {
            document.getElementById('winner-overlay').style.display = 'none';
            socket.emit('reset-game');
        }

        socket.on('assign-symbol', (data) => {
            mySymbol = data.symbol;
            myColor = data.color;
            myAvatar = data.avatar;
        });

        socket.on('update-players', (players) => {
            const p1 = players.find(p => p.symbol === 'X');
            const p2 = players.find(p => p.symbol === 'O');
            if (p1) updateInfo('p1-info', p1);
            if (p2) updateInfo('p2-info', p2);
        });

        function updateInfo(elementId, player) {
            const div = document.getElementById(elementId);
            div.innerHTML = `
                <span class="avatar-img" style="background:white;">${player.avatar}</span>
                <span style="color: ${player.color}">${player.name} (${player.score})</span>
                <span>${player.symbol}</span>
            `;
        }

        socket.on('update-scores', (players) => {
            const p1 = players.find(p => p.symbol === 'X');
            const p2 = players.find(p => p.symbol === 'O');
            if (p1) updateInfo('p1-info', p1);
            if (p2) updateInfo('p2-info', p2);
        });

        socket.on('game-start', () => {
            document.getElementById('turn-text').innerText = '¡Juego Iniciado! Turno de X';
            document.getElementById('winner-overlay').style.display = 'none';
        });

        socket.on('update-turn', (data) => {
            document.getElementById('turn-text').innerText = data.turn ? `Turno de ${data.turn}` : (data.message || '');
        });

        socket.on('update-board-visual', (board) => {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => {
                cells[i].innerText = val || '';
                if (val === 'X') cells[i].style.color = '#3498db';
                else if (val === 'O') cells[i].style.color = '#e74c3c';
                else cells[i].style.color = 'white';
            });
        });

        socket.on('game-over', (data) => {
            if (data.winner === 'draw') {
                document.getElementById('winner-text').innerText = '¡Empate!';
            } else {
                document.getElementById('winner-text').innerText = `¡Ganador: ${data.winner}!`;
            }
            document.getElementById('winner-overlay').style.display = 'flex';
            document.getElementById('turn-text').innerText = '¡Juego Terminado!';
        });

        socket.on('reset-board', () => {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerText = ''; c.style.color = 'white'; });
            document.getElementById('winner-overlay').style.display = 'none';
        });

        socket.on('chat-message', (data) => {
            const container = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.innerHTML = `<span style="color:${data.color}">${data.avatar} ${data.name}:</span> ${data.text}`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        });

        socket.on('player-disconnected', (data) => {
            const turnText = document.getElementById('turn-text');
            turnText.innerText = data.message;
        });
    </script>
</body>
</html>
